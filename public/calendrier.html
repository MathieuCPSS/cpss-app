<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calendrier Annuel – 2 pages A4</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #f7f7f7;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.mois {
    border: 1px solid #000;
    padding: 10px;
    border-radius: 4px;
}

.mois h2 {
    text-align: center;
    font-size: 20px;
    margin: 0 0 10px 0;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
}

th, td {
    border: 1px solid #000;
    padding: 3px;
    text-align: center;
}

</style>

<!-- Librairies PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>Calendrier Annuel – Export PDF 2 pages</h1>

<div style="text-align:center; margin-bottom:20px;">
    <select id="selectAnnee" style="padding:6px 10px; font-size:16px;"></select>
</div>

<div style="text-align:center; margin-bottom:20px;">
    <button onclick="exporterCalendrierPDF()" style="padding:8px 14px; font-size:16px; cursor:pointer;">
        📄 Exporter en PDF (2 pages)
    </button>
</div>

<!-- Conteneurs PDF invisibles -->
<div id="pdfPage1" style="
    position:absolute;
    left:-9999px;
    top:0;
    width:793px;
    background:white;
    padding:20px;
"></div>

<div id="pdfPage2" style="
    position:absolute;
    left:-9999px;
    top:0;
    width:793px;
    background:white;
    padding:20px;
"></div>

<script>
// -------------------------
// JOURS FÉRIÉS
// -------------------------
function joursFeriesFrance(annee) {
    let f = Math.floor,
        G = annee % 19,
        C = f(annee / 100),
        H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
        I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
        J = (annee + f(annee / 4) + I + 2 - C + f(C / 4)) % 7,
        L = I - J,
        moisPaques = 3 + f((L + 40) / 44),
        jourPaques = L + 28 - 31 * f(moisPaques / 4);

    const datePaques = new Date(annee, moisPaques - 1, jourPaques);

    function addDays(date, days) {
        let d = new Date(date);
        d.setDate(d.getDate() + days);
        return d;
    }

    const feries = {
        [`${annee}-01-01`]: "Jour de l'an",
        [`${annee}-05-01`]: "Fête du Travail",
        [`${annee}-05-08`]: "Victoire 1945",
        [`${annee}-07-14`]: "Fête Nationale",
        [`${annee}-08-15`]: "Assomption",
        [`${annee}-11-01`]: "Toussaint",
        [`${annee}-11-11`]: "Armistice",
        [`${annee}-12-25`]: "Noël"
    };

    feries[format(addDays(datePaques, 1))] = "Lundi de Pâques";
    feries[format(addDays(datePaques, 39))] = "Ascension";
    feries[format(addDays(datePaques, 50))] = "Lundi de Pentecôte";

    function format(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    return feries;
}

// -------------------------
// SÉLECTEUR D’ANNÉE
// -------------------------
const selectAnnee = document.getElementById("selectAnnee");
const anneeCourante = new Date().getFullYear();

for (let a = anneeCourante - 1; a <= anneeCourante + 1; a++) {
    const opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    if (a === anneeCourante) opt.selected = true;
    selectAnnee.appendChild(opt);
}

const moisNoms = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

// -------------------------
// GÉNÉRATION DES 2 PAGES PDF
// -------------------------
function genererPagePDF(pageDiv, moisDebut, moisFin) {
    const annee = selectAnnee.value;
    const joursFeries = joursFeriesFrance(annee);

    let html = `
        <h1 style="text-align:center; margin-bottom:20px;">Calendrier ${annee}</h1>
        <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:20px;">
    `;

    for (let m = moisDebut; m <= moisFin; m++) {
        html += `
        <div class="mois">
            <h2>${moisNoms[m]}</h2>
            <table>
                <tr>
                    <th>L</th><th>M</th><th>M</th><th>J</th><th>V</th><th>S</th><th>D</th>
                </tr>
        `;

        const date = new Date(annee, m, 1);
        const startDay = (date.getDay() + 6) % 7;
        const daysInMonth = new Date(annee, m+1, 0).getDate();

        let col = 0;
        html += "<tr>";

        for (let i = 0; i < startDay; i++) {
            html += "<td></td>";
            col++;
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${annee}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

            let contenu = d;
            if (joursFeries[dateStr]) contenu += " 🎉";

            html += `<td>${contenu}</td>`;
            col++;

            if (col === 7) {
                html += "</tr><tr>";
                col = 0;
            }
        }

        html += "</tr></table></div>";
    }

    html += "</div>";

    pageDiv.innerHTML = html;
}

// -------------------------
// EXPORT PDF 2 PAGES
// -------------------------
async function exporterCalendrierPDF() {
    const { jsPDF } = window.jspdf;

    const page1 = document.getElementById("pdfPage1");
    const page2 = document.getElementById("pdfPage2");

    genererPagePDF(page1, 0, 5);   // Janvier → Juin
    genererPagePDF(page2, 6, 11);  // Juillet → Décembre

    await new Promise(r => setTimeout(r, 200));

    const canvas1 = await html2canvas(page1, { scale: 2, backgroundColor: "#FFFFFF" });
    const canvas2 = await html2canvas(page2, { scale: 2, backgroundColor: "#FFFFFF" });

    const img1 = canvas1.toDataURL("image/jpeg", 1.0);
    const img2 = canvas2.toDataURL("image/jpeg", 1.0);

    const pdf = new jsPDF("portrait", "mm", "a4");
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();

    function addImageToPDF(img, canvas) {
        let w = pageWidth;
        let h = canvas.height * (w / canvas.width);

        if (h > pageHeight) {
            const ratio = pageHeight / h;
            w *= ratio;
            h *= ratio;
        }

        const x = (pageWidth - w) / 2;
        const y = (pageHeight - h) / 2;

        pdf.addImage(img, "JPEG", x, y, w, h);
    }

    addImageToPDF(img1, canvas1);
    pdf.addPage();
    addImageToPDF(img2, canvas2);

    pdf.save(`Calendrier_${selectAnnee.value}.pdf`);
}

</script>

</body>
</html>
