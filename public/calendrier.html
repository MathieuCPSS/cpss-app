<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calendrier Annuel â€“ 2 pages A4</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #f7f7f7;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* --- CALENDRIER VISIBLE (inchangĂ©) --- */
.calendrier {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

.mois {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 5px #ccc;
}

.mois h2 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 10px;
}

.jours {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-weight: bold;
    margin-bottom: 5px;
}

.case {
    border: 1px solid #ddd;
    min-height: 60px;
    padding: 3px;
    position: relative;
}

.case .num {
    font-weight: bold;
}

/* --- PDF (propre, sans couleurs, sans icĂ´nes) --- */
.pdf-mois {
    border: 1px solid #000;
    padding: 10px;
}

.pdf-mois h2 {
    text-align: center;
    font-size: 18px;
    margin: 0 0 10px 0;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
}

th, td {
    border: 1px solid #000;
    padding: 3px;
    text-align: center;
}
</style>

<!-- Librairies PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>Calendrier Annuel â€“ Export PDF 2 pages</h1>

<div style="text-align:center; margin-bottom:20px;">
    <select id="selectAnnee" style="padding:6px 10px; font-size:16px;"></select>
</div>

<div style="text-align:center; margin-bottom:20px;">
    <button onclick="exporterCalendrierPDF()" style="padding:8px 14px; font-size:16px; cursor:pointer;">
        đź“„ Exporter en PDF (2 pages)
    </button>
</div>

<!-- CALENDRIER VISIBLE -->
<div id="calendrier" class="calendrier"></div>

<!-- CONTENEURS PDF INVISIBLES -->
<div id="pdfPage1" style="position:absolute; left:-9999px; top:0; width:793px; background:white; padding:20px;"></div>
<div id="pdfPage2" style="position:absolute; left:-9999px; top:0; width:793px; background:white; padding:20px;"></div>

<script>
/* -------------------------
   JOURS FĂ‰RIĂ‰S
------------------------- */
function joursFeriesFrance(annee) {
    let f = Math.floor,
        G = annee % 19,
        C = f(annee / 100),
        H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
        I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
        J = (annee + f(annee / 4) + I + 2 - C + f(C / 4)) % 7,
        L = I - J,
        moisPaques = 3 + f((L + 40) / 44),
        jourPaques = L + 28 - 31 * f(moisPaques / 4);

    const datePaques = new Date(annee, moisPaques - 1, jourPaques);

    function addDays(date, days) {
        let d = new Date(date);
        d.setDate(d.getDate() + days);
        return d;
    }

    const feries = {
        [`${annee}-01-01`]: "Jour de l'an",
        [`${annee}-05-01`]: "FĂŞte du Travail",
        [`${annee}-05-08`]: "Victoire 1945",
        [`${annee}-07-14`]: "FĂŞte Nationale",
        [`${annee}-08-15`]: "Assomption",
        [`${annee}-11-01`]: "Toussaint",
        [`${annee}-11-11`]: "Armistice",
        [`${annee}-12-25`]: "NoĂ«l"
    };

    feries[format(addDays(datePaques, 1))] = "Lundi de PĂ˘ques";
    feries[format(addDays(datePaques, 39))] = "Ascension";
    feries[format(addDays(datePaques, 50))] = "Lundi de PentecĂ´te";

    function format(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    return feries;
}

/* -------------------------
   SĂ‰LECTEUR Dâ€™ANNĂ‰E
------------------------- */
const selectAnnee = document.getElementById("selectAnnee");
const anneeCourante = new Date().getFullYear();

for (let a = anneeCourante - 1; a <= anneeCourante + 1; a++) {
    const opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    if (a === anneeCourante) opt.selected = true;
    selectAnnee.appendChild(opt);
}

const moisNoms = ["Janvier","FĂ©vrier","Mars","Avril","Mai","Juin","Juillet","AoĂ»t","Septembre","Octobre","Novembre","DĂ©cembre"];

/* -------------------------
   CALENDRIER VISIBLE (inchangĂ©)
------------------------- */
function genererCalendrier() {
    const annee = selectAnnee.value;
    const joursFeries = joursFeriesFrance(annee);

    const cont = document.getElementById("calendrier");
    cont.innerHTML = "";

    for (let m = 0; m < 12; m++) {
        const div = document.createElement("div");
        div.className = "mois";

        div.innerHTML = `
            <h2>${moisNoms[m]}</h2>
            <div class="jours">
                <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
            </div>
        `;

        const grid = document.createElement("div");
        grid.style.display = "grid";
        grid.style.gridTemplateColumns = "repeat(7, 1fr)";

        const date = new Date(annee, m, 1);
        const startDay = (date.getDay() + 6) % 7;
        const daysInMonth = new Date(annee, m+1, 0).getDate();

        for (let i = 0; i < startDay; i++) {
            grid.appendChild(document.createElement("div"));
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const cell = document.createElement("div");
            cell.className = "case";

            const dateStr = `${annee}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

            let contenu = `<div class="num">${d}</div>`;

            // RĂ©cupĂ©ration des heures depuis localStorage
            const key = `h_${annee}_${m+1}_${d}`;
            const data = JSON.parse(localStorage.getItem(key) || "{}");

            if (data.terrain) contenu += `<div>đź› ď¸Ź ${data.terrain}</div>`;
            if (data.bureau) contenu += `<div>đźŹ˘ ${data.bureau}</div>`;
            if (joursFeries[dateStr]) contenu += `<div>đźŽ‰</div>`;

            cell.innerHTML = contenu;
            grid.appendChild(cell);
        }

        div.appendChild(grid);
        cont.appendChild(div);
    }
}

selectAnnee.onchange = genererCalendrier;
genererCalendrier();

/* -------------------------
   GĂ‰NĂ‰RATION DES 2 PAGES PDF (propre)
------------------------- */
function genererPagePDF(pageDiv, moisDebut, moisFin) {
    const annee = selectAnnee.value;
    const joursFeries = joursFeriesFrance(annee);

    let html = `
        <h1 style="text-align:center; margin-bottom:20px;">Calendrier ${annee}</h1>
        <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:20px;">
    `;

    for (let m = moisDebut; m <= moisFin; m++) {
        html += `
        <div class="pdf-mois">
            <h2>${moisNoms[m]}</h2>
            <table>
                <tr>
                    <th>L</th><th>M</th><th>M</th><th>J</th><th>V</th><th>S</th><th>D</th>
                </tr>
        `;

        const date = new Date(annee, m, 1);
        const startDay = (date.getDay() + 6) % 7;
        const daysInMonth = new Date(annee, m+1, 0).getDate();

        let col = 0;
        html += "<tr>";

        for (let i = 0; i < startDay; i++) {
            html += "<td></td>";
            col++;
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${annee}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

            const key = `h_${annee}_${m+1}_${d}`;
            const data = JSON.parse(localStorage.getItem(key) || "{}");

            let contenu = `${d}<br>`;

            if (data.terrain) contenu += `Terrain : ${data.terrain}<br>`;
            if (data.bureau) contenu += `Bureau : ${data.bureau}<br>`;
            if (joursFeries[dateStr]) contenu += `FĂ©riĂ©`;

            html += `<td>${contenu}</td>`;
            col++;

            if (col === 7) {
                html += "</tr><tr>";
                col = 0;
            }
        }

        html += "</tr></table></div>";
    }

    html += "</div>";

    pageDiv.innerHTML = html;
}

/* -------------------------
   EXPORT PDF 2 PAGES
------------------------- */
async function exporterCalendrierPDF() {
    const { jsPDF } = window.jspdf;

    const page1 = document.getElementById("pdfPage1");
    const page2 = document.getElementById("pdfPage2");

    genererPagePDF(page1, 0, 5);   // Janvier â†’ Juin
    genererPagePDF(page2, 6, 11);  // Juillet â†’ DĂ©cembre

    await new Promise(r => setTimeout(r, 200));

    const canvas1 = await html2canvas(page1, { scale: 2, backgroundColor: "#FFFFFF" });
    const canvas2 = await html2canvas(page2, { scale: 2, backgroundColor: "#FFFFFF" });

    const img1 = canvas1.toDataURL("image/jpeg", 1.0);
    const img2 = canvas2.toDataURL("image/jpeg", 1.0);

    const pdf = new jsPDF("portrait", "mm", "a4");
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();

    function addImageToPDF(img, canvas) {
        let w = pageWidth;
        let h = canvas.height * (w / canvas.width);

        if (h > pageHeight) {
            const ratio = pageHeight / h;
            w *= ratio;
            h *= ratio;
        }

        const x = (pageWidth - w) / 2;
        const y = (pageHeight - h) / 2;

        pdf.addImage(img, "JPEG", x, y, w, h);
    }

    addImageToPDF(img1, canvas1);
    pdf.addPage();
    addImageToPDF(img2, canvas2);

    pdf.save(`Calendrier_${selectAnnee.value}.pdf`);
}
</script>

</body>
</html>
