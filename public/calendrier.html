<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calendrier Annuel - Suivi 214 jours</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #f7f7f7;
    padding: 20px;
}

header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

header button {
    padding: 8px 14px;
    font-size: 15px;
    cursor: pointer;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

#anneeContainer {
    text-align: center;
    margin-bottom: 20px;
    font-size: 18px;
}

#anneeContainer input {
    width: 120px;
    padding: 6px;
    font-size: 18px;
    text-align: center;
}

.calendrier {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

.mois {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 5px #ccc;
}

.mois h2 {
    text-align: center;
    font-family: "Caveat", cursive;
    font-size: 26px;
    margin-bottom: 10px;
}

.jours {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-weight: bold;
    margin-bottom: 5px;
}

.case {
    border: 1px solid #ddd;
    min-height: 60px;
    padding: 3px;
    position: relative;
    cursor: pointer;
}

.case .num {
    font-weight: bold;
}

.case.terrain { background: #d9f7d9; }
.case.bureau { background: #d9e8ff; }
.case.mixte { background: #fceec0; }
.case.ferie { background: #eeeeee; }
.case.trajet { background: #ffe7c2; }
.heures {
    font-size: 11px;
    margin-top: 2px;
}
</style>
    
<style>

/* Tous les jours travaillés → même couleur */

.case.mixte,

}

/* Jour de congé */

}

/* Jour de repos */
.case.repos {
    background: #444444 !important; /* gris neutre */
    color: #ffffff !important;
}

    .case.ferie {
    background: #555555 !important;
    color: #ffffff !important;
    position: relative;
}
    .case.ferie::after {
    content: "Férié";
    position: absolute;
    bottom: 4px;
    right: 4px;
    font-size: 10px;
    opacity: 0.8;
}
  /* Fond général */
  body {
      background: #1e1e1e !important;
      color: #ffffff !important;
  }

  /* Conteneur des mois */
  .mois {
      background: #2a2a2a !important;
      color: #ffffff !important;
      box-shadow: 0 0 5px #000 !important;
      border: 1px solid #444 !important;
  }

  /* Titres des mois */
  .mois h2 {
      color: #ffffff !important;
  }

  /* Jours de la semaine */
  .jours {
      color: #ffffff !important;
  }

  /* Cases du calendrier */
  .case {
      background: #2a2a2a !important;

      border: 1px solid #444 !important;
  }

  /* Numéro du jour */
  .case .num {

  /* États spéciaux (terrain, bureau, mixte, etc.) */

  /* Heures affichées dans les cases */

      color: #dddddd !important;

  /* Header */
  header button {
      background: #333 !important;
      color: #fff !important;
      border: 1px solid #555 !important;
  }

  #anneeContainer input {
      background: #333 !important;
      color: #fff !important;
      border: 1px solid #555 !important;
  }
}
    </style>
</head>

<body>

<header>
    <button onclick="window.location.href='menu.html'">← Retour menu</button>
    <button onclick="window.location.href='logout.html'">Déconnexion</button>
</header>

<h1>Calendrier Annuel – Suivi 214 jours</h1>

<div id="anneeContainer">
    Année :
    <input type="number" id="selectAnnee" value="2026" min="2000" max="2100">
</div>

<div id="compteur" style="text-align:center; font-size:20px; margin-bottom:20px;"></div>

<button onclick="exportPDF()" style="margin-left:10px; margin-bottom:20px;">📄 Export PDF</button>

<div class="calendrier" id="calendrier"></div>

<script>
// ------------------------------
// GESTION DE L'ANNÉE
// ------------------------------
const inputAnnee = document.getElementById("selectAnnee");
let annee = parseInt(inputAnnee.value);

inputAnnee.addEventListener("change", () => {
    annee = parseInt(inputAnnee.value);
    genererCalendrier();
});

// ------------------------------
// JOURS FÉRIÉS AUTOMATIQUES
// ------------------------------
function calculPaques(annee) {
    const f = Math.floor,
    G = annee % 19,
    C = f(annee / 100),
    H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
    I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
    J = (annee + f(annee / 4) + I + 2 - C + f(C / 4)) % 7,
    L = I - J,
    mois = 3 + f((L + 40) / 44),
    jour = L + 28 - 31 * f(mois / 4);
    return `${annee}-${String(mois).padStart(2,"0")}-${String(jour).padStart(2,"0")}`;
}

function joursFeries(annee) {
    const paques = new Date(calculPaques(annee));

    const lundiPaques = new Date(paques);
    lundiPaques.setDate(paques.getDate() + 1);

    const vendrediSaint = new Date(paques);
    vendrediSaint.setDate(paques.getDate() - 2);

    const ascension = new Date(paques);
    ascension.setDate(paques.getDate() + 39);

    const pentecote = new Date(paques);
    pentecote.setDate(paques.getDate() + 49);

    const format = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

    return {
        // Jours fériés nationaux
        [`${annee}-01-01`]: true,
        [`${annee}-05-01`]: true,
        [`${annee}-05-08`]: true,
        [`${annee}-07-14`]: true,
        [`${annee}-08-15`]: true,
        [`${annee}-11-01`]: true,
        [`${annee}-11-11`]: true,
        [`${annee}-12-25`]: true,

        // Jours fériés religieux mobiles
        [format(paques)]: true,
        [format(lundiPaques)]: true,
        [format(vendrediSaint)]: true,   // ← Alsace-Moselle
        [format(ascension)]: true,
        [format(pentecote)]: true,

        // Alsace-Moselle : Saint Étienne
        [`${annee}-12-26`]: true
    };
}

// ------------------------------
// GÉNÉRATION CALENDRIER
// ------------------------------
const moisNoms = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const calendrier = document.getElementById("calendrier");

function genererCalendrier() {
    // 🔥 Nettoyage une fois pour toutes des anciennes clés suffixées
    Object.keys(localStorage).forEach(k => {
        if (k.startsWith("heuresTerrain_") || k.startsWith("heuresTrajet_")) {
            localStorage.removeItem(k);
        }
    });

    // On lit directement les données officielles
    const heuresTerrain = JSON.parse(localStorage.getItem("heuresTerrain") || "{}");
    const heuresTrajet  = JSON.parse(localStorage.getItem("heuresTrajet")  || "{}");
    const heuresBureau  = JSON.parse(localStorage.getItem("heuresBureau_" + annee) || "{}");

    calendrier.innerHTML = "";

    const feries = joursFeries(annee);

    let joursTravailles = 0;

    for (let m = 0; m < 12; m++) {
        const divMois = document.createElement("div");
        divMois.className = "mois";

        divMois.innerHTML = `
            <h2>${moisNoms[m]}</h2>
            <div class="jours">
                <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
            </div>
        `;

        const grid = document.createElement("div");
        grid.style.display = "grid";
        grid.style.gridTemplateColumns = "repeat(7, 1fr)";

        const date = new Date(annee, m, 1);
        const startDay = (date.getDay() + 6) % 7;

        for (let i = 0; i < startDay; i++) {
            grid.appendChild(document.createElement("div"));
        }

        const daysInMonth = new Date(annee, m+1, 0).getDate();

        for (let d = 1; d <= daysInMonth; d++) {
            const caseDiv = document.createElement("div");
            caseDiv.className = "case";

            const dateStr = `${annee}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

            const t  = heuresTerrain[dateStr] || 0;
            const b  = heuresBureau[dateStr]  || 0;
            const tr = heuresTrajet[dateStr]  || 0;
            const repos = JSON.parse(localStorage.getItem("repos_" + annee) || "{}");
            const conge = JSON.parse(localStorage.getItem("conge_" + annee) || "{}");

            if (tr > 0 && t > 0) caseDiv.classList.add("mixte");
            else if (tr > 0)     caseDiv.classList.add("trajet");
            else if (t > 0)      caseDiv.classList.add("terrain");
            else if (b > 0)      caseDiv.classList.add("bureau");

            if (feries[dateStr]) caseDiv.classList.add("ferie");
            if (repos[dateStr]) caseDiv.classList.add("repos");
            if (conge[dateStr]) caseDiv.classList.add("conge");
            
            let contenuHeures = "";
            if (repos[dateStr]) contenuHeures = `<div class="heures">Repos</div>`;
            if (conge[dateStr]) contenuHeures = `<div class="heures">Congé</div>`;
            if (t  > 0) contenuHeures += `<div class="heures">🛠️ ${(t/60).toFixed(2)}h</div>`;
            if (tr > 0) contenuHeures += `<div class="heures">🚗 ${(tr/60).toFixed(2)}h</div>`;
            if (b  > 0) contenuHeures += `<div class="heures">🏢 ${(b/60).toFixed(2)}h</div>`;
            if (feries[dateStr]) contenuHeures += `<div class="heures">🎉</div>`;

            if (t > 0) joursTravailles++;

            caseDiv.innerHTML = `<div class="num">${d}</div>${contenuHeures}`;

       caseDiv.onclick = () => {
    ouvrirDialogue(dateStr, t, tr, b);
};

            grid.appendChild(caseDiv);
        }

        divMois.appendChild(grid);
        calendrier.appendChild(divMois);
    }

    document.getElementById("compteur").innerHTML =
        `Jours travaillés : ${joursTravailles} / 214<br>Jours restants : ${214 - joursTravailles}`;
}

genererCalendrier();

</script>

<!-- Librairies propres -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- EXPORT PDF PROPRE -->
<script>
async function exportPDF() {

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const element = document.getElementById("calendrier");

    // Capture EXACTE du rendu réel
    const canvas = await html2canvas(element, {
        scale: 3,
        useCORS: true
    });

    const imgData = canvas.toDataURL("image/jpeg", 0.98);

    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();

    // Calcul du ratio pour remplir la page
    const imgWidth = pdfWidth;
    const imgHeight = canvas.height * (pdfWidth / canvas.width);

    pdf.addImage(imgData, "JPEG", 0, 0, imgWidth, imgHeight);

    pdf.save(`Calendrier_${annee}.pdf`);
}
    
</script>
    
<!-- Fenêtre de dialogue -->
<div id="dialogOverlay" style="
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); z-index:1000;">
</div>

<div id="dialogBox" style="
    display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:#2a2a2a; color:white; padding:20px; border-radius:10px;
    width:300px; z-index:1001; box-shadow:0 0 10px black;">
    
    <h3 id="dialogTitre" style="margin-top:0;">Modifier le jour</h3>

    <div id="dialogImport"></div>

    <label>Heures bureau :</label>
    <input type="text" id="inputBureau" placeholder="ex : 7:30" style="
        width:100%; padding:6px; margin:5px 0 15px 0;">

    <label><input type="checkbox" id="chkRepos"> Repos</label><br>
    <label><input type="checkbox" id="chkConge"> Congé</label>

    <div id="zoneFinConge" style="display:none; margin-top:10px;">
        Fin des congés :
        <input type="date" id="inputFinConge" style="width:100%; padding:6px;">
    </div>

    <div style="margin-top:20px; text-align:right;">
        <button id="btnEffacer" style="margin-right:10px;">Effacer ce jour</button>
        <button id="btnAnnuler">Annuler</button>
        <button id="btnValider">Valider</button>
    </div>
</div>
    <script>
// ------------------------------
// FENÊTRE DE DIALOGUE
// ------------------------------
let currentDateStr = null;
let heuresTerrainCache = null;
let heuresTrajetCache = null;
let heuresBureauCache = null;

function ouvrirDialogue(dateStr, t, tr, b) {
    currentDateStr = dateStr;
    heuresTerrainCache = t;
    heuresTrajetCache = tr;
    heuresBureauCache = b;

document.getElementById("btnEffacer").onclick = () => {
    if (!confirm("Effacer toutes les données pour le " + currentDateStr + " ?")) return;

    // Charger les données
    const heuresBureau = JSON.parse(localStorage.getItem("heuresBureau_" + annee) || "{}");
    const repos = JSON.parse(localStorage.getItem("repos_" + annee) || "{}");
    const conge = JSON.parse(localStorage.getItem("conge_" + annee) || "{}");

    // Effacer bureau
    delete heuresBureau[currentDateStr];
    localStorage.setItem("heuresBureau_" + annee, JSON.stringify(heuresBureau));

    // Effacer repos
    delete repos[currentDateStr];
    localStorage.setItem("repos_" + annee, JSON.stringify(repos));

    // Effacer congé
    delete conge[currentDateStr];
    localStorage.setItem("conge_" + annee, JSON.stringify(conge));

    // Optionnel : effacer terrain/trajet importés
    // supprimerHeuresImportees(currentDateStr);

    fermerDialogue();
    genererCalendrier();
};
    
    document.getElementById("dialogTitre").innerText =
        "Modifier le " + dateStr;

    // Affichage des données importées
    let html = "";
    if (t > 0) html += `<div>🛠️ Terrain : ${(t/60).toFixed(2)}h</div>`;
    if (tr > 0) html += `<div>🚗 Trajet : ${(tr/60).toFixed(2)}h</div>`;
    if (html === "") html = "<i>Aucune donnée importée</i>";

    document.getElementById("dialogImport").innerHTML = html;

    // Pré-remplir bureau
    document.getElementById("inputBureau").value =
        b > 0 ? (Math.floor(b/60) + ":" + String(b%60).padStart(2,"0")) : "";

    // Reset des cases
    document.getElementById("chkRepos").checked = false;
    document.getElementById("chkConge").checked = false;
    document.getElementById("zoneFinConge").style.display = "none";

    // Afficher
    document.getElementById("dialogOverlay").style.display = "block";
    document.getElementById("dialogBox").style.display = "block";
}

// Gestion affichage fin congé
document.getElementById("chkConge").addEventListener("change", () => {
    document.getElementById("zoneFinConge").style.display =
        document.getElementById("chkConge").checked ? "block" : "none";
});

// Annuler
document.getElementById("btnAnnuler").onclick = () => {
    document.getElementById("dialogOverlay").style.display = "none";
    document.getElementById("dialogBox").style.display = "none";
};

// Valider
document.getElementById("btnValider").onclick = () => {
    const heuresBureau = JSON.parse(localStorage.getItem("heuresBureau_" + annee) || "{}");

    const chkRepos = document.getElementById("chkRepos").checked;
    const chkConge = document.getElementById("chkConge").checked;

    // REPOS
    if (chkRepos) {
        delete heuresBureau[currentDateStr];
        supprimerHeuresImportees(currentDateStr);
        marquerRepos(currentDateStr);
        localStorage.setItem("heuresBureau_" + annee, JSON.stringify(heuresBureau));
        fermerDialogue();
        genererCalendrier();
        return;
    }

    // CONGÉ
    if (chkConge) {
        const fin = document.getElementById("inputFinConge").value;
        if (!fin) {
            alert("Veuillez indiquer la date de fin des congés.");
            return;
        }
        appliquerConge(currentDateStr, fin);
        fermerDialogue();
        genererCalendrier();
        return;
    }

    // BUREAU (manuel)
    const saisie = document.getElementById("inputBureau").value.trim();
    if (saisie !== "") {
        let h = 0, m = 0;
        if (saisie.includes(":")) {
            [h, m] = saisie.split(":").map(Number);
        } else {
            h = Number(saisie);
        }
        heuresBureau[currentDateStr] = h*60 + m;
    } else {
        delete heuresBureau[currentDateStr];
    }

    localStorage.setItem("heuresBureau_" + annee, JSON.stringify(heuresBureau));
    fermerDialogue();
    genererCalendrier();
};

function fermerDialogue() {
    document.getElementById("dialogOverlay").style.display = "none";
    document.getElementById("dialogBox").style.display = "none";
}

// ------------------------------
// LOGIQUE REPOS / CONGÉ
// ------------------------------
function supprimerHeuresImportees(dateStr) {
    const terrain = JSON.parse(localStorage.getItem("heuresTerrain") || "{}");
    const trajet  = JSON.parse(localStorage.getItem("heuresTrajet")  || "{}");

    delete terrain[dateStr];
    delete trajet[dateStr];

    localStorage.setItem("heuresTerrain", JSON.stringify(terrain));
    localStorage.setItem("heuresTrajet", JSON.stringify(trajet));
}

function marquerRepos(dateStr) {
    const repos = JSON.parse(localStorage.getItem("repos_" + annee) || "{}");
    repos[dateStr] = true;
    localStorage.setItem("repos_" + annee, JSON.stringify(repos));
}

function appliquerConge(debut, fin) {
    const conge = JSON.parse(localStorage.getItem("conge_" + annee) || "{}");
    const terrain = JSON.parse(localStorage.getItem("heuresTerrain") || "{}");
    const trajet  = JSON.parse(localStorage.getItem("heuresTrajet")  || "{}");
    const bureau  = JSON.parse(localStorage.getItem("heuresBureau_" + annee) || "{}");

    let d = new Date(debut);
    const end = new Date(fin);

    while (d <= end) {
        const ds = d.toISOString().split("T")[0];

        delete terrain[ds];
        delete trajet[ds];
        delete bureau[ds];

        conge[ds] = true;

        d.setDate(d.getDate() + 1);
    }

    localStorage.setItem("heuresTerrain", JSON.stringify(terrain));
    localStorage.setItem("heuresTrajet", JSON.stringify(trajet));
    localStorage.setItem("heuresBureau_" + annee, JSON.stringify(bureau));
    localStorage.setItem("conge_" + annee, JSON.stringify(conge));
}
        
    </script>
</body>
