<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calendrier Annuel - Suivi 214 jours</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #f7f7f7;
    padding: 20px;
}

header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

header button {
    padding: 8px 14px;
    font-size: 15px;
    cursor: pointer;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

#anneeContainer {
    text-align: center;
    margin-bottom: 20px;
    font-size: 18px;
}

#anneeContainer input {
    width: 120px;
    padding: 6px;
    font-size: 18px;
    text-align: center;
}

.calendrier {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

.mois {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 5px #ccc;
}

.mois h2 {
    text-align: center;
    font-family: "Caveat", cursive;
    font-size: 26px;
    margin-bottom: 10px;
}

.jours {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-weight: bold;
    margin-bottom: 5px;
}

.case {
    border: 1px solid #ddd;
    min-height: 60px;
    padding: 3px;
    position: relative;
    cursor: pointer;
}

.case .num {
    font-weight: bold;
}

.case.terrain {
    background: #d9f7d9;
}

.case.bureau {
    background: #d9e8ff;
}

.case.mixte {
    background: #fceec0;
}

.case.ferie {
    background: #eeeeee;
}

.heures {
    font-size: 11px;
    margin-top: 2px;
}
</style>
</head>

<body>

<header>
    <button onclick="window.location.href='menu.html'">← Retour menu</button>
    <button onclick="window.location.href='logout.html'">Déconnexion</button>
</header>

<h1>Calendrier Annuel – Suivi 214 jours</h1>

<div id="anneeContainer">
    Année :
    <input type="number" id="selectAnnee" value="2026" min="2000" max="2100">
</div>

<div id="compteur" style="text-align:center; font-size:20px; margin-bottom:20px;"></div>

<button onclick="exportPDF()" style="margin-left:10px; margin-bottom:20px;">📄 Export PDF</button>

<div class="calendrier" id="calendrier"></div>
<script>
// ------------------------------
// GESTION DE L'ANNÉE
// ------------------------------
const inputAnnee = document.getElementById("selectAnnee");
let annee = parseInt(inputAnnee.value);

// Quand l'année change → on recharge tout
inputAnnee.addEventListener("change", () => {
    annee = parseInt(inputAnnee.value);
    genererCalendrier();
});

// ------------------------------
// JOURS FÉRIÉS AUTOMATIQUES
// ------------------------------
function calculPaques(annee) {
    const f = Math.floor,
    G = annee % 19,
    C = f(annee / 100),
    H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
    I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
    J = (annee + f(annee / 4) + I + 2 - C + f(C / 4)) % 7,
    L = I - J,
    mois = 3 + f((L + 40) / 44),
    jour = L + 28 - 31 * f(mois / 4);
    return `${annee}-${String(mois).padStart(2,"0")}-${String(jour).padStart(2,"0")}`;
}

function joursFeries(annee) {
    const paques = new Date(calculPaques(annee));
    const ascension = new Date(paques); ascension.setDate(paques.getDate() + 39);
    const pentecote = new Date(paques); pentecote.setDate(paques.getDate() + 49);

    const format = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

    return {
        [`${annee}-01-01`]: true,
        [`${annee}-05-01`]: true,
        [`${annee}-05-08`]: true,
        [`${annee}-07-14`]: true,
        [`${annee}-08-15`]: true,
        [`${annee}-11-01`]: true,
        [`${annee}-11-11`]: true,
        [`${annee}-12-25`]: true,
        [format(paques)]: true,
        [format(ascension)]: true,
        [format(pentecote)]: true
    };
}

// ------------------------------
// GÉNÉRATION CALENDRIER
// ------------------------------
const moisNoms = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const calendrier = document.getElementById("calendrier");

function genererCalendrier() {
        // --- IMPORT AUTOMATIQUE DES DONNÉES DU RAPPORT ---
    const oldTerrain = JSON.parse(localStorage.getItem("heuresTerrain") || "{}");
    const oldBureau = JSON.parse(localStorage.getItem("heuresBureau") || "{}");

    // Si l'ancien stockage contient des données → on les copie vers l'année
    if (Object.keys(oldTerrain).length > 0) {
        localStorage.setItem("heuresTerrain_" + annee, JSON.stringify(oldTerrain));
    }

    if (Object.keys(oldBureau).length > 0) {
        localStorage.setItem("heuresBureau_" + annee, JSON.stringify(oldBureau));
    }
    calendrier.innerHTML = "";

    const feries = joursFeries(annee);

    const heuresTerrain = JSON.parse(localStorage.getItem("heuresTerrain_" + annee) || "{}");
    const heuresBureau = JSON.parse(localStorage.getItem("heuresBureau_" + annee) || "{}");

    let joursTravailles = 0;

    for (let m = 0; m < 12; m++) {
        const divMois = document.createElement("div");
        divMois.className = "mois";

        divMois.innerHTML = `
            <h2>${moisNoms[m]}</h2>
            <div class="jours">
                <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
            </div>
        `;

        const grid = document.createElement("div");
        grid.style.display = "grid";
        grid.style.gridTemplateColumns = "repeat(7, 1fr)";

        const date = new Date(annee, m, 1);
        const startDay = (date.getDay() + 6) % 7;

        for (let i = 0; i < startDay; i++) {
            grid.appendChild(document.createElement("div"));
        }

        const daysInMonth = new Date(annee, m+1, 0).getDate();

        for (let d = 1; d <= daysInMonth; d++) {
            const caseDiv = document.createElement("div");
            caseDiv.className = "case";

            const dateStr = `${annee}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

            const t = heuresTerrain[dateStr] || 0;
            const b = heuresBureau[dateStr] || 0;

            // Couleurs
            if (t > 0 && b > 0) caseDiv.classList.add("mixte");
            else if (t > 0) caseDiv.classList.add("terrain");
            else if (b > 0) caseDiv.classList.add("bureau");

            if (feries[dateStr]) caseDiv.classList.add("ferie");

            // Affichage heures
            let contenuHeures = "";
            if (t > 0) contenuHeures += `<div class="heures">🛠️ ${(t/60).toFixed(2)}h</div>`;
            if (b > 0) contenuHeures += `<div class="heures">🏢 ${(b/60).toFixed(2)}h</div>`;
            if (feries[dateStr]) contenuHeures += `<div class="heures">🎉</div>`;

            if (t > 0 || b > 0) joursTravailles++;

            caseDiv.innerHTML = `<div class="num">${d}</div>${contenuHeures}`;

            // Clic → prompt
            caseDiv.onclick = () => {
                const saisie = prompt("Saisir les heures bureau :", "");

                if (saisie === null) return;

                const clean = saisie.trim();

                if (clean === "0" || clean === "00" || clean === "00:00" || clean === "0h" || clean === "0h00") {
                    delete heuresBureau[dateStr];
                    localStorage.setItem("heuresBureau_" + annee, JSON.stringify(heuresBureau));
                    genererCalendrier();
                    return;
                }

                if (clean.includes(":")) {
                    const [h, m] = clean.split(":").map(Number);
                    heuresBureau[dateStr] = h*60 + m;
                    localStorage.setItem("heuresBureau_" + annee, JSON.stringify(heuresBureau));
                    genererCalendrier();
                }
            };

            grid.appendChild(caseDiv);
        }

        divMois.appendChild(grid);
        calendrier.appendChild(divMois);
    }

    document.getElementById("compteur").innerHTML =
        `Jours travaillés : ${joursTravailles} / 214<br>Jours restants : ${214 - joursTravailles}`;
}

genererCalendrier();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
async function exportPDF() {
    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "a4"
    });

    const heuresTerrain = JSON.parse(localStorage.getItem("heuresTerrain_" + annee) || "{}");
    const heuresBureau = JSON.parse(localStorage.getItem("heuresBureau_" + annee) || "{}");
    const feries = joursFeries(annee);

    const moisNoms = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

    let y = 20;

function printMonth(pdf, m) {
    pdf.setFontSize(14);
    pdf.text(moisNoms[m] + " " + annee, 10, y);
    y += 6;

    pdf.setFontSize(10);
    pdf.text("L   M   M   J   V   S   D", 10, y);
    y += 5;

    const date = new Date(annee, m, 1);
    const startDay = (date.getDay() + 6) % 7;

    let line = "";
    for (let i = 0; i < startDay; i++) line += "     ";

    const daysInMonth = new Date(annee, m+1, 0).getDate();

    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${annee}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

        const t = heuresTerrain[dateStr] || 0;
        const b = heuresBureau[dateStr] || 0;

        let txt = String(d).padStart(2,"0");

        if (feries[dateStr]) txt += " 🎉";
        if (t > 0) txt += `  T:${(t/60).toFixed(2)}h`;
        if (b > 0) txt += `  B:${(b/60).toFixed(2)}h`;

        line += txt + "   ";

        if ((startDay + d) % 7 === 0) {
            // 🔥 Nettoyage des emojis AVANT impression
            const cleanLine = line.replace(/[\u{1F300}-\u{1FAFF}]/gu, "");
            pdf.text(cleanLine, 10, y);
            y += 5;
            line = "";
        }
    }

    if (line.trim() !== "") {
        // 🔥 Nettoyage des emojis AVANT impression
        const cleanLine = line.replace(/[\u{1F300}-\u{1FAFF}]/gu, "");
        pdf.text(cleanLine, 10, y);
        y += 8;
    }

    y += 4;
}

    // PAGE 1 : Janvier → Juin
    for (let m = 0; m < 6; m++) {
        printMonth(pdf, m);
        if (y > 260) {
            pdf.addPage();
            y = 20;
        }
    }

    // PAGE 2 : Juillet → Décembre
    pdf.addPage();
    y = 20;

    for (let m = 6; m < 12; m++) {
        printMonth(pdf, m);
        if (y > 260) {
            pdf.addPage();
            y = 20;
        }
    }

    pdf.save(`Calendrier_${annee}.pdf`);
}
</script>
</body>
</html>
