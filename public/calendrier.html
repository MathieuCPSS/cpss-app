<script>
    function joursFeriesFrance(annee) {
    // Calcul de la date de Pâques (algorithme de Meeus)
    let f = Math.floor,
        G = annee % 19,
        C = f(annee / 100),
        H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
        I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
        J = (annee + f(annee / 4) + I + 2 - C + f(C / 4)) % 7,
        L = I - J,
        moisPaques = 3 + f((L + 40) / 44),
        jourPaques = L + 28 - 31 * f(moisPaques / 4);

    const datePaques = new Date(annee, moisPaques - 1, jourPaques);

    function addDays(date, days) {
        let d = new Date(date);
        d.setDate(d.getDate() + days);
        return d;
    }

    // Jours fériés fixes
    const feries = {
        [`${annee}-01-01`]: "Jour de l'an",
        [`${annee}-05-01`]: "Fête du Travail",
        [`${annee}-05-08`]: "Victoire 1945",
        [`${annee}-07-14`]: "Fête Nationale",
        [`${annee}-08-15`]: "Assomption",
        [`${annee}-11-01`]: "Toussaint",
        [`${annee}-11-11`]: "Armistice",
        [`${annee}-12-25`]: "Noël"
    };

    // Jours fériés mobiles
    const lundiPaques = addDays(datePaques, 1);
    const ascension = addDays(datePaques, 39);
    const pentecote = addDays(datePaques, 50);

    function format(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    feries[format(lundiPaques)] = "Lundi de Pâques";
    feries[format(ascension)] = "Ascension";
    feries[format(pentecote)] = "Lundi de Pentecôte";

    return feries;
}
// Génération du calendrier
const moisNoms = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const calendrier = document.getElementById("calendrier");
const joursFeries = joursFeriesFrance(annee);

if (joursFeries[dateISO]) {
    caseDiv.classList.add("ferie");
    contenuHeures = `<div class="heures">🎉 ${joursFeries[dateISO]}</div>`;
}   
function genererCalendrier() {
    calendrier.innerHTML = "";

    const heuresTerrain = JSON.parse(localStorage.getItem("heuresTerrain") || "{}");
    const heuresBureau = JSON.parse(localStorage.getItem("heuresBureau") || "{}");

    let joursTravailles = 0;

    for (let m = 0; m < 12; m++) {
        const divMois = document.createElement("div");
        divMois.className = "mois";

        divMois.innerHTML = `<h2>${moisNoms[m]}</h2>
        <div class="jours">
            <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
        </div>`;

        const grid = document.createElement("div");
        grid.style.display = "grid";
        grid.style.gridTemplateColumns = "repeat(7, 1fr)";

        const date = new Date(new Date().getFullYear(), m, 1);
        const startDay = (date.getDay() + 6) % 7;

        for (let i = 0; i < startDay; i++) {
            grid.appendChild(document.createElement("div"));
        }

        const daysInMonth = new Date(new Date().getFullYear(), m+1, 0).getDate();

        for (let d = 1; d <= daysInMonth; d++) {
            const caseDiv = document.createElement("div");
            caseDiv.className = "case";

            const dateStr = `${new Date().getFullYear()}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

            const t = heuresTerrain[dateStr] || 0;
            const b = heuresBureau[dateStr] || 0;

            let contenuHeures = "";

            if (t > 0 && b > 0) {
                caseDiv.classList.add("mixte");
                contenuHeures = `<div class="heures">🛠️${(t/60).toFixed(2)}h / 🏢${(b/60).toFixed(2)}h</div>`;
                joursTravailles++;
            } else if (t > 0) {
                caseDiv.classList.add("terrain");
                contenuHeures = `<div class="heures">🛠️${(t/60).toFixed(2)}h</div>`;
                joursTravailles++;
            } else if (b > 0) {
                caseDiv.classList.add("bureau");
                contenuHeures = `<div class="heures">🏢${(b/60).toFixed(2)}h</div>`;
                joursTravailles++;
            }

            caseDiv.innerHTML = `<div class="num">${d}</div>${contenuHeures}`;

          caseDiv.onclick = () => {
    const saisie = prompt("Heures bureau (HH:MM) :", "");

    if (saisie === null) return; // annuler

    const clean = saisie.trim();

    // Si l'utilisateur tape 0, 00:00, 0h, etc. → on efface
    if (clean === "0" || clean === "00" || clean === "00:00" || clean === "0h" || clean === "0h00") {
        delete heuresBureau[dateStr];
        localStorage.setItem("heuresBureau", JSON.stringify(heuresBureau));
        genererCalendrier();
        return;
    }

    // Sinon on enregistre normalement
    if (clean.includes(":")) {
        const [h, m] = clean.split(":").map(Number);
        heuresBureau[dateStr] = h*60 + m;
        localStorage.setItem("heuresBureau", JSON.stringify(heuresBureau));
        genererCalendrier();
    }
};

            grid.appendChild(caseDiv);
        }

        divMois.appendChild(grid);
        calendrier.appendChild(divMois);
    }

    document.getElementById("compteur").innerHTML =
        `Jours travaillés : ${joursTravailles} / 214<br>Jours restants : ${214 - joursTravailles}`;
}

genererCalendrier();
</script>
