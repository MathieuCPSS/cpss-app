<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPSS — Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Robot, Arial, sans-serif;
      background: url("img/ATMA.png") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Voile sombre par-dessus l'image */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
    background: linear-gradient(
    rgba(45, 70, 120, 0.45),
    rgba(30, 50, 90, 0.45)
  );
    pointer-events: none;
  z-index: -1;
  }

    .card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(2px);
      border-radius: 12px;
      padding: 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.20);
      border: 1px solid rgba(255, 255, 255, 0.10);
      text-align: center;
    }
    h1 { color: #4B0082; font-size: 22px; margin-bottom: 4px; }
    .role { font-size: 12px; color: white; margin-bottom: 28px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin-bottom: 14px;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-stock { background: linear-gradient(135deg, #4AA3FF, #1F7AD6); color: white; }
    .btn-rapport { background: linear-gradient(135deg, #4AA3FF, #1F7AD6); color: white; }
    .btn-logout { background: linear-gradient(135deg, #4AA3FF, #1F7AD6); color: white; font-size: 13px; padding: 10px; margin-top: 8px; }
    .logo {
  width: 160px;      /* Ajuste selon ton goût */
  height: auto;
  display: block;
  margin: 0 auto 15px auto;
}
  </style>
</head>
<body>
  <div class="card">
    <h1 class="titre">
  <img src="img/logo-cpss.png" alt="Logo CPSS" class="logo">
</h1>
    <p class="role" id="roleLabel">Chargement…</p>
    <a href="/stock.html" class="btn btn-stock">📦 Gestion du stock</a>
    <a href="/rapport.html" class="btn btn-rapport" id="btnRapport">📋 Rapports d'intervention</a>
    <button onclick="logout()" class="btn btn-logout">🚪 Se déconnecter</button>
  </div>
  <script>
    fetch('/api/me').then(r => r.json()).then(data => {
      if (!data.role) { window.location.href = '/'; return; }
      document.getElementById('roleLabel').textContent =
        data.role === 'admin' ? '👤 Connecté en tant qu\'administrateur' : '👁 Connecté en lecture seule (bureau)';
      if (data.role === 'viewer') {
        document.getElementById('btnRapport').textContent = '📋 Consulter les rapports';
      }
    }).catch(() => window.location.href = '/');

    function logout() {
      fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/');
    }
  </script>
</body>
</html>
